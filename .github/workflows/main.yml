name: Build Dylib
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Theos
        uses: animal-overlord/theos-action@v2
        with:
          theos-src: https://github.com/theos/theos.git

      - name: Build Dylib
        run: |
          make package FINALPACKAGE=1
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Gemini-Dylib
          path: packages/*.deb
